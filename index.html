<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroPix 95</title>
    <style>
        /* Estilos Base Retrô */
        body {
            background-color: #333;
            font-family: 'Courier New', Courier, monospace; /* Fonte estilo máquina de escrever */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container do Celular */
        .app-container {
            width: 360px;
            height: 640px;
            background-color: #c0c0c0; /* Cinza Windows 95 */
            border: 4px solid #fff;
            border-right-color: #555;
            border-bottom-color: #555;
            box-shadow: 5px 5px 0px #000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Top Bar Retrô */
        .top-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 5px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .title { padding-left: 5px; }
        .close-btn { 
            background-color: #c0c0c0;
            color: black;
            border: 2px solid #fff;
            border-right-color: #555;
            border-bottom-color: #555;
            padding: 0 6px;
            font-weight: bold;
        }

        /* Conteúdo */
        .content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 { color: #550055; font-size: 24px; text-align: center; margin: 0; text-transform: uppercase; }

        /* Estilo de Input Retrô */
        input[type="text"], input[type="number"] {
            background-color: #fff;
            border: 2px solid #555;
            border-right-color: #fff;
            border-bottom-color: #fff;
            padding: 10px;
            font-family: inherit;
            font-size: 16px;
        }

        /* Botões Retrô */
        .btn {
            background-color: #c0c0c0;
            border: 3px solid #fff;
            border-right-color: #555;
            border-bottom-color: #555;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            color: #000;
            text-transform: uppercase;
        }

        .btn:active {
            border: 3px solid #555;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }

        .btn-pix {
            background-color: #550055;
            color: white;
            border-color: #aa00aa;
        }

        /* Rodapé de Menu */
        .footer-menu {
            border-top: 2px solid #555;
            background-color: #c0c0c0;
            display: flex;
            justify-content: space-around;
            padding: 10px;
        }
        
        .menu-item { font-size: 12px; text-align: center; color: #000; }
        
        /* Responsividade */
        @media (max-width: 400px) {
            .app-container {
                width: 100vw;
                height: 100vh;
                border: none;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Barra superior estilo windows -->
        <div class="top-bar">
            <span class="title">PIX_TRANSFER.EXE</span>
            <span class="close-btn">X</span>
        </div>

        <div class="content">
            <h1>RetroPix</h1>
            
            <input type="text" placeholder="Chave Pix (CPF/Telefone)" />
            <input type="number" placeholder="Valor R$" />
            
            <div class="btn btn-pix">Enviar Pix</div>
            <div class="btn">Ler QR Code</div>
        </div>

        <!-- Menu inferior -->
        <div class="footer-menu">
            <div class="menu-item">📁 Início</div>
            <div class="menu-item">💰 Extrato</div>
            <div class="menu-item">⚙️ Config</div>
        </div>
    </div>

</body>
</html>
